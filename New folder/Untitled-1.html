<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00d4ff;
        }

        canvas {
            border: 3px solid #00d4ff;
            background: black;
            box-shadow: 0 0 20px #00d4ff;
        }

        .scoreboard {
            display: flex;
            gap: 100px;
            font-size: 1.5em;
            font-weight: bold;
        }

        .score-item {
            text-align: center;
        }

        .score-item h2 {
            font-size: 0.8em;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .score {
            font-size: 1.5em;
            color: #00ff00;
        }

        .controls {
            text-align: center;
            font-size: 1em;
            color: #00d4ff;
            margin-top: 20px;
        }

        .controls p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score-item">
                <h2>PLAYER</h2>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <h2>COMPUTER</h2>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="pong" width="800" height="400"></canvas>

        <div class="controls">
            <p>🖱️ Move mouse up/down or use ⬆️⬇️ arrow keys to control left paddle</p>
            <p>Computer controls the right paddle (AI)</p>
            <p>First to reach 5 points wins!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const playerScoreDisplay = document.getElementById('playerScore');
        const computerScoreDisplay = document.getElementById('computerScore');

        // Game constants
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 7;
        const WINNING_SCORE = 5;

        // Player paddle
        const player = {
            x: 10,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            color: '#00ff00',
            score: 0,
            velocityY: 0
        };

        // Computer paddle (AI)
        const computer = {
            x: canvas.width - PADDLE_WIDTH - 10,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            color: '#ff00ff',
            score: 0,
            speed: 4
        };

        // Ball object
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: BALL_SIZE,
            velocityX: 5,
            velocityY: 5,
            maxSpeed: 8,
            color: '#00d4ff'
        };

        // Keyboard state
        const keys = {};

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = mouseY - player.height / 2;

            // Keep paddle within bounds
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        });

        // Draw function
        function draw() {
            // Clear canvas
            context.fillStyle = 'rgba(0, 0, 0, 0.1)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            context.strokeStyle = '#00d4ff';
            context.setLineDash([5, 10]);
            context.beginPath();
            context.moveTo(canvas.width / 2, 0);
            context.lineTo(canvas.width / 2, canvas.height);
            context.stroke();
            context.setLineDash([]);

            // Draw player paddle
            context.fillStyle = player.color;
            context.fillRect(player.x, player.y, player.width, player.height);

            // Draw computer paddle
            context.fillStyle = computer.color;
            context.fillRect(computer.x, computer.y, computer.width, computer.height);

            // Draw ball
            context.fillStyle = ball.color;
            context.beginPath();
            context.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            context.fill();
        }

        // Update function
        function update() {
            // Handle keyboard controls
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= 6;
            }
            if (keys['ArrowDown'] && player.y + player.height < canvas.height) {
                player.y += 6;
            }

            // Update ball position
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.velocityY = -ball.velocityY;
                
                // Keep ball in bounds
                if (ball.y - ball.size < 0) ball.y = ball.size;
                if (ball.y + ball.size > canvas.height) ball.y = canvas.height - ball.size;
            }

            // Ball collision with player paddle
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height &&
                ball.velocityX < 0
            ) {
                ball.velocityX = -ball.velocityX;
                ball.x = player.x + player.width + ball.size;

                // Add spin based on where ball hits paddle
                let collidePoint = ball.y - (player.y + player.height / 2);
                collidePoint = collidePoint / (player.height / 2);
                ball.velocityY = collidePoint * ball.maxSpeed;
            }

            // Ball collision with computer paddle
            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height &&
                ball.velocityX > 0
            ) {
                ball.velocityX = -ball.velocityX;
                ball.x = computer.x - ball.size;

                // Add spin based on where ball hits paddle
                let collidePoint = ball.y - (computer.y + computer.height / 2);
                collidePoint = collidePoint / (computer.height / 2);
                ball.velocityY = collidePoint * ball.maxSpeed;
            }

            // Ball out of bounds - scoring
            if (ball.x - ball.size < 0) {
                computer.score++;
                computerScoreDisplay.textContent = computer.score;
                resetBall();
                checkWin();
            } else if (ball.x + ball.size > canvas.width) {
                player.score++;
                playerScoreDisplay.textContent = player.score;
                resetBall();
                checkWin();
            }

            // Computer AI
            const computerCenter = computer.y + computer.height / 2;
            if (computerCenter < ball.y - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ball.y + 35) {
                computer.y -= computer.speed;
            }

            // Keep computer paddle in bounds
            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.velocityY = (Math.random() - 0.5) * 6;
        }

        // Check for winner
        function checkWin() {
            if (player.score === WINNING_SCORE) {
                setTimeout(() => {
                    alert(`🎉 Player Wins! Final Score: ${player.score} - ${computer.score}`);
                    resetGame();
                }, 300);
            } else if (computer.score === WINNING_SCORE) {
                setTimeout(() => {
                    alert(`🎉 Computer Wins! Final Score: ${computer.score} - ${player.score}`);
                    resetGame();
                }, 300);
            }
        }

        // Reset entire game
        function resetGame() {
            player.score = 0;
            computer.score = 0;
            playerScoreDisplay.textContent = 0;
            computerScoreDisplay.textContent = 0;
            resetBall();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
